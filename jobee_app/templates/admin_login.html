{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator Login - JoBee</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h1 { text-align: center; margin-bottom: 5px; font-size: 28px; color: #333; }
        h3 { text-align: center; color: #666; margin-top: 0; text-transform: uppercase; font-size: 13px; letter-spacing: 2px; font-weight: 800; }
       
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #333; }
       
        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #333;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 10px;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .btn-login:hover { background-color: #444; }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .toggle-link a {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Log In</h1>
    <h3>Administrator</h3>

    <form method="POST" action="{% url 'admin_login' %}">
        {% csrf_token %}

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <div class="form-group">
            <label for="admin_id">Admin ID</label>
            <input type="text" id="admin_id" name="admin_id" placeholder="Enter your Admin ID" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••••••" required>
        </div>

        <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="toggle-link">
        Don't have an account? <a href="{% url 'admin_signup' %}">Sign Up</a>
    </div>
</div>

</body>
</html>
