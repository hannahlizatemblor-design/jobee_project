{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduate Sign Up - JoBee</title>
    <style>
        :root {
            --primary-navy: #2C3E50;
            --bg-light: #F4F7F9;
            --white: #FFFFFF;
            --text-main: #333;
            --text-muted: #777;
            --border-color: #E1E8EE;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .signup-card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { margin: 0; font-size: 32px; color: var(--text-main); }
        header p { margin: 5px 0 0; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }

        .form-group { margin-bottom: 15px; }
        .name-row { display: flex; gap: 15px; }
        .name-row .form-group { flex: 1; }

        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary-navy); }
        input[readonly] { background-color: #f0f0f0; color: #888; cursor: not-allowed; }

        .btn-register {
            width: 100%;
            padding: 16px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-register:hover { background-color: #444; }
        .btn-register:active { transform: scale(0.98); }

        .toggle-link { text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .toggle-link a { color: #007bff; text-decoration: none; font-weight: 600; }
        .error-msg { color: #e74c3c; font-size: 13px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="signup-card">
        <header>
            <h1>Sign Up</h1>
            <p>Graduate</p>
        </header>

        <form method="POST" action="{% url 'grad_signup' %}">
            {% csrf_token %}

            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}

            <div class="form-group">
                <label>Grad ID</label>
                <input type="text" value="Auto-generated" readonly>
            </div>

            <div class="name-row">
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" value="{{ data.last_name|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" value="{{ data.first_name|default:'' }}" required>
                </div>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" value="{{ data.dob|default:'' }}" required>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" value="{{ data.email|default:'' }}" required>
            </div>

            <div class="form-group">
                <label>Address:</label>
                <input type="text" name="address" value="{{ data.address|default:'' }}" required>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirmPassword" value="{{ data.confirmPassword|default:'' }}" required>
            </div>

            <button type="submit" class="btn-register">Register</button>
        </form>

        <div class="toggle-link">
            Already have an account? <a href="{% url 'grad_login' %}">Log In</a>
        </div>
    </div>

</body>
</html>
